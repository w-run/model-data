# 厂商配置
# 只包含真正研发大模型的公司/实验室，不包含中转商/聚合商
# name: 中国厂商使用中文名，国外厂商使用英文名
# alias: 常见 provider 别名 ID 数组（如 OpenRouter、HuggingFace 上的组织名）

[openai]
name = "OpenAI"
alias = ["openai-community", "oai", "chatgpt"]
website = "https://openai.com"
api_docs = "https://platform.openai.com/docs/models"

[anthropic]
name = "Anthropic"
alias = ["anthropic-community", "anthropic-ai", "claude"]
website = "https://www.anthropic.com"
api_docs = "https://docs.anthropic.com/en/docs/about-claude/models"

[google]
name = "Google"
alias = ["gemini"]
website = "https://ai.google"
api_docs = "https://ai.google.dev/gemini-api/docs/models"

[meta]
name = "Meta"
alias = ["meta-llama", "meta-llm", "meta-ai"]
website = "https://ai.meta.com"
api_docs = "https://llama.meta.com"

[deepseek]
name = "深度求索"
alias = ["deepseek-ai"]
website = "https://www.deepseek.com"
api_docs = "https://api-docs.deepseek.com"

[alibaba]
name = "阿里云"
alias = ["qwen", "aliyun"]
website = "https://www.alibabacloud.com"
api_docs = "https://www.alibabacloud.com/help/en/model-studio/models"

[mistral]
name = "Mistral AI"
alias = ["mistralai", "mistral-ai"]
website = "https://mistral.ai"
api_docs = "https://docs.mistral.ai/getting-started/models/"

[cohere]
name = "Cohere"
