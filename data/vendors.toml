website = "https://cohere.com"
api_docs = "https://docs.cohere.com/docs/models"

[xai]
name = "xAI"
alias = ["x-ai", "grok"]
website = "https://x.ai"
api_docs = "https://docs.x.ai/docs/models"

[nvidia]
name = "NVIDIA"
