name: Build & Deploy to gh-pages

on:
  schedule:
    # UTC 每日 02:00 执行（北京时间 10:00）
    - cron: '0 2 * * *'
  workflow_dispatch:
    # 支持手动触发

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tomli 2>/dev/null || true

      - name: Run build
        run: |
          python -m scripts.build

      - name: Prepare gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 获取远程 gh-pages 分支（如果存在）
          git fetch origin gh-pages 2>/dev/null || true

          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            echo "gh-pages branch exists, checking out"
            git checkout -b gh-pages origin/gh-pages
          else
            echo "Creating orphan gh-pages branch"
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi

      - name: Deploy artifacts
        run: |
          # 从 main 分支提取构建产物
          for f in vendors.json models.json; do
            git show "main:$f" > "$f"
          done

          # 复制 logos 目录
          rm -rf logos
          mkdir -p logos
          git ls-tree --name-only main logos/ | while read logo; do
            git show "main:$logo" > "$logo"
          done

          # 验证产物
          echo "=== Deployed files ==="
          ls -la vendors.json models.json logos/

          # 生成 index.html
          cat > index.html << 'HTMLEOF'
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Model Info - AI 模型信息库</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .container { max-width: 960px; margin: 0 auto; padding: 3rem 1.5rem; }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { color: #94a3b8; margin-bottom: 2.5rem; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; transition: border-color 0.2s; }
    .card:hover { border-color: #60a5fa; }
    .card h2 { font-size: 1.1rem; color: #f1f5f9; margin-bottom: 0.75rem; }
    .card p { color: #94a3b8; font-size: 0.9rem; line-height: 1.6; }
    .links { display: flex; gap: 1rem; margin-top: 0.75rem; }
    .links a { color: #60a5fa; text-decoration: none; font-size: 0.85rem; font-family: monospace; }
    .links a:hover { text-decoration: underline; }
    footer { text-align: center; color: #475569; font-size: 0.8rem; margin-top: 3rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Model Info</h1>
    <p class="subtitle">AI 模型信息库 — 厂商与模型数据，每日自动更新</p>
    <div class="card">
      <h2>📊 vendors.json</h2>
      <p>所有厂商信息列表，包含名称、别名、官网、API 文档链接等。</p>
      <div class="links">
        <a href="vendors.json">查看 JSON</a>
      </div>
    </div>
    <div class="card">
      <h2>🤖 models.json</h2>
      <p>所有模型信息列表，包含模型 ID、厂商关联、上下文限制、价格、模态、能力等。</p>
      <div class="links">
        <a href="models.json">查看 JSON</a>
      </div>
    </div>
    <div class="card">
      <h2>🖼️ logos/</h2>
      <p>各厂商 SVG 格式 Logo 文件。</p>
      <div class="links">
        <a href="logos/">浏览目录</a>
      </div>
    </div>
    <footer>
      由 GitHub Actions 自动构建 &amp; 部署 · 数据来源于 OpenRouter API、百度千帆、火山引擎豆包
    </footer>
  </div>
</body>
</html>
HTMLEOF

          git add vendors.json models.json logos/ index.html
          git diff --cached --quiet || git commit -m "deploy: update data $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Push gh-pages
        run: |
          git push origin gh-pages
