name: Daily Build Deploy

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'data/**'
      - '.github/workflows/ci.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install --upgrade pip && pip install tomli 2>/dev/null || true

      - name: Build
        run: python -m scripts.build

      - name: Stage output
        run: |
          mkdir -p /tmp/out
          cp vendors.json models.json /tmp/out/
          cp -r logos /tmp/out/ 2>/dev/null || true
          cp data/gh-pages-index.html /tmp/out/index.html

      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Deploy
        run: |
          cp /tmp/out/vendors.json /tmp/out/models.json .
          cp /tmp/out/index.html .
          rm -rf logos
          cp -r /tmp/out/logos . 2>/dev/null || mkdir -p logos
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add vendors.json models.json logos/ index.html
          git diff --cached --quiet || git commit -m "deploy: $(date -u +%Y-%m-%d)"

      - name: Push
        run: git push origin gh-pages
